---
name: Run SuperLinter

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  super-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # super linter requires git history to work properly
          persist-credentials: false

      - name: Run Super-Linter
        # v7 (< 8.3.1) is vulnerable to command injection via crafted filenames (fixed in 8.3.1)
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_PYTHON_PYINK: false # prefer Black
          VALIDATE_PYTHON_RUFF_FORMAT: false # conflicts with Black's formatting style
          VALIDATE_CHECKOV: false # prefer Hadolint
          VALIDATE_MARKDOWN_PRETTIER: false # prefer Markdownlint
          VALIDATE_JSON_PRETTIER: false # conflicts with Biome's tab-based formatting
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
